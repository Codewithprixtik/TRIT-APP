[build]
  functions = "netlify/functions"
  publish   = "."

[build.environment]
  SECRETS_SCAN_ENABLED = "false"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type  = "application/manifest+json"
    Cache-Control = "no-cache"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type           = "application/javascript"
    Cache-Control          = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Content-Security-Policy = "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src *; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data: blob:; font-src *; frame-src *; worker-src * blob:;"

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200
