<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRIT — Connecting Upstox...</title>
<style>
body{margin:0;background:#080808;display:flex;align-items:center;justify-content:center;
  height:100vh;font-family:'Inter',sans-serif;color:#fff;flex-direction:column;gap:1rem}
.spin{width:40px;height:40px;border:3px solid #1a1a1a;border-top-color:#FFD700;
  border-radius:50%;animation:sp 0.8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
p{color:rgba(255,255,255,0.5);font-size:0.9rem}
</style>
</head>
<body>
<div class="spin"></div>
<p id="msg">Connecting to Upstox...</p>
<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const error  = params.get('error');

  if (error) {
    document.getElementById('msg').textContent = 'Login cancelled. Returning to app...';
    setTimeout(() => window.location.href = '/app.html', 2000);
    return;
  }

  if (!code) {
    document.getElementById('msg').textContent = 'No code received. Returning...';
    setTimeout(() => window.location.href = '/app.html', 2000);
    return;
  }

  try {
    document.getElementById('msg').textContent = 'Getting access token...';
    const resp = await fetch(`/.netlify/functions/market?action=token&code=${code}`);
    const data = await resp.json();

    if (data.access_token) {
      // Save token with expiry (valid till midnight IST)
      const expiry = new Date();
      expiry.setHours(23, 59, 59, 999);
      localStorage.setItem('upstox_token', data.access_token);
      localStorage.setItem('upstox_token_expiry', expiry.getTime());
      document.getElementById('msg').textContent = '✅ Connected! Redirecting to app...';
      setTimeout(() => window.location.href = '/app.html', 1500);
    } else {
      document.getElementById('msg').textContent = 'Token error. Returning to app...';
      setTimeout(() => window.location.href = '/app.html', 2000);
    }
  } catch(e) {
    document.getElementById('msg').textContent = 'Error. Returning to app...';
    setTimeout(() => window.location.href = '/app.html', 2000);
  }
})();
</script>
</body>
</html>
