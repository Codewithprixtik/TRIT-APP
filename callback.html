<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRIT — Connecting Upstox...</title>
<style>
body{margin:0;background:#080808;display:flex;align-items:center;justify-content:center;
  height:100vh;font-family:'Inter',sans-serif;color:#fff;flex-direction:column;gap:1rem;padding:1rem;text-align:center}
.spin{width:40px;height:40px;border:3px solid #1a1a1a;border-top-color:#FFD700;
  border-radius:50%;animation:sp 0.8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
#msg{color:rgba(255,255,255,0.7);font-size:0.9rem;max-width:300px}
#dbg{color:rgba(255,100,100,0.8);font-size:0.72rem;max-width:320px;margin-top:0.5rem;word-break:break-all;display:none}
</style>
</head>
<body>
<div class="spin" id="spin"></div>
<p id="msg">Connecting to Upstox...</p>
<p id="dbg"></p>
<script>
(async function() {
  var msg  = document.getElementById('msg');
  var dbg  = document.getElementById('dbg');
  var p    = new URLSearchParams(window.location.search);
  var code = p.get('code');
  var err  = p.get('error');

  function done(text, detail) {
    document.getElementById('spin').style.display = 'none';
    msg.textContent = text;
    if (detail) { dbg.style.display='block'; dbg.textContent=detail; }
    setTimeout(function(){ window.location.href='/app.html'; }, 3000);
  }

  if (err)  { done('Login cancelled.', err); return; }
  if (!code){ done('No auth code found.', window.location.href); return; }

  try {
    msg.textContent = 'Getting access token...';
    var r = await fetch('/.netlify/functions/market?action=token&code=' + encodeURIComponent(code));
    var d = await r.json();

    if (d.access_token) {
      var exp = new Date(); exp.setHours(23,59,59,999);
      localStorage.setItem('upstox_token', d.access_token);
      localStorage.setItem('upstox_token_expiry', exp.getTime());
      document.getElementById('spin').style.display = 'none';
      msg.style.color = '#2ECC71';
      msg.textContent = '✅ Connected! Real-time prices active.';
      setTimeout(function(){ window.location.href='/app.html'; }, 2000);
    } else {
      done('Token failed.', JSON.stringify(d));
    }
  } catch(e) {
    done('Connection error.', e.message);
  }
})();
</script>
</body>
</html>
