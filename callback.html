<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRIT — Connecting Upstox...</title>
<style>
body{margin:0;background:#080808;display:flex;align-items:center;justify-content:center;
  height:100vh;font-family:'Inter',sans-serif;color:#fff;flex-direction:column;gap:1rem;padding:1rem;text-align:center}
.spin{width:40px;height:40px;border:3px solid #1a1a1a;border-top-color:#FFD700;
  border-radius:50%;animation:sp 0.8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
#msg{color:rgba(255,255,255,0.7);font-size:0.9rem;max-width:300px}
#debug{color:rgba(255,100,100,0.7);font-size:0.72rem;max-width:320px;margin-top:0.5rem;word-break:break-all;display:none}
</style>
</head>
<body>
<div class="spin" id="spinner"></div>
<p id="msg">Connecting to Upstox...</p>
<p id="debug"></p>
<script>
(async function() {
  const msg    = document.getElementById('msg');
  const dbg    = document.getElementById('debug');
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const error  = params.get('error');

  function showError(text, detail) {
    document.getElementById('spinner').style.display = 'none';
    msg.textContent = text;
    if (detail) { dbg.style.display = 'block'; dbg.textContent = detail; }
    setTimeout(() => window.location.href = '/app.html', 4000);
  }

  if (error) { showError('Login cancelled. Returning...', error); return; }
  if (!code) { showError('No auth code received.', 'URL: ' + window.location.href); return; }

  try {
    msg.textContent = 'Exchanging token...';

    // Direct Upstox token exchange (bypass Netlify function)
    const body = new URLSearchParams({
      code,
      client_id    : '4540a89a-adcd-45c5-8f68-a3cbca2e87c7',
      client_secret: 'lbtvpak4cu',
      redirect_uri : 'https://thatrookieindiantrader.in/callback',
      grant_type   : 'authorization_code',
    });

    // Try Netlify function first
    let data = null;
    try {
      msg.textContent = 'Connecting via server...';
      const r1 = await fetch('/.netlify/functions/market?action=token&code=' + encodeURIComponent(code), {
        signal: AbortSignal.timeout(8000)
      });
      data = await r1.json();
    } catch(e) {
      dbg.style.display = 'block';
      dbg.textContent = 'Server error: ' + e.message;
    }

    if (data?.access_token) {
      // Save token
      const expiry = new Date();
      expiry.setHours(23, 59, 59, 999);
      localStorage.setItem('upstox_token', data.access_token);
      localStorage.setItem('upstox_token_expiry', expiry.getTime());
      localStorage.setItem('upstox_connected_at', new Date().toISOString());

      document.getElementById('spinner').style.display = 'none';
      msg.textContent = '✅ Upstox Connected! Real-time prices active.';
      msg.style.color = '#2ECC71';
      setTimeout(() => window.location.href = '/app.html', 2000);
    } else {
      // Show raw response for debugging
      const rawResp = data ? JSON.stringify(data) : 'No response';
      showError('Token exchange failed.', rawResp);
    }

  } catch(e) {
    showError('Connection error.', e.message);
  }
})();
</script>
</body>
</html>
