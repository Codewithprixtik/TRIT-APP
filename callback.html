<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRIT — Connecting...</title>
<style>
body{margin:0;background:#080808;display:flex;align-items:center;justify-content:center;
  height:100vh;font-family:'Inter',sans-serif;color:#fff;flex-direction:column;gap:1rem;
  padding:1rem;text-align:center}
.spin{width:44px;height:44px;border:3px solid #1a1a1a;border-top-color:#FFD700;
  border-radius:50%;animation:sp 0.8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
#msg{color:rgba(255,255,255,0.8);font-size:0.95rem;max-width:300px;line-height:1.6}
#dbg{color:rgba(255,100,100,0.8);font-size:0.72rem;max-width:320px;
  margin-top:0.5rem;word-break:break-all;display:none}
.logo{font-family:'Bangers',cursive;font-size:1.8rem;letter-spacing:4px;color:#FFD700}
</style>
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
</head>
<body>
<div class="logo">TRIT.</div>
<div class="spin" id="spin"></div>
<p id="msg">Connecting to Upstox...</p>
<p id="dbg"></p>

<script>
(async function() {
    var msg  = document.getElementById('msg');
    var dbg  = document.getElementById('dbg');
    var p    = new URLSearchParams(window.location.search);
    var code = p.get('code');
    var err  = p.get('error');

    function showError(text, detail) {
        document.getElementById('spin').style.display = 'none';
        msg.textContent = text;
        if (detail) { dbg.style.display='block'; dbg.textContent=detail; }
        setTimeout(function(){ window.location.href='/app.html'; }, 4000);
    }

    if (err)  { showError('Login cancelled.', err); return; }
    if (!code){ showError('No auth code.', window.location.href); return; }

    // Check if this is admin mode
    var isAdmin = sessionStorage.getItem('trit_admin_mode') === '1';
    var adminPass = sessionStorage.getItem('trit_admin_pass') || '';

    try {
        msg.textContent = 'Getting access token...';

        // Exchange code for token
        var r    = await fetch('/.netlify/functions/market?action=token&code=' + encodeURIComponent(code));
        var data = await r.json();

        if (!data.access_token) {
            showError('Token failed.', JSON.stringify(data));
            return;
        }

        var token = data.access_token;

        if (isAdmin) {
            // ADMIN MODE — Save token server-side for all users
            msg.textContent = 'Saving server token for all users...';
            var saveResp = await fetch(
                '/.netlify/functions/market?action=save_token&token=' +
                encodeURIComponent(token) + '&pass=' + encodeURIComponent(adminPass)
            );
            var saveData = await saveResp.json();

            sessionStorage.removeItem('trit_admin_mode');
            sessionStorage.removeItem('trit_admin_pass');

            document.getElementById('spin').style.display = 'none';
            msg.style.color = '#2ECC71';
            msg.textContent = '✅ Server token saved!\nAll users now have real-time prices.';
            setTimeout(function(){ window.location.href='/admin.html?saved=1'; }, 2000);

        } else {
            // USER MODE — Save token locally
            var exp = new Date(); exp.setHours(23,59,59,999);
            localStorage.setItem('upstox_token', token);
            localStorage.setItem('upstox_token_expiry', exp.getTime());

            document.getElementById('spin').style.display = 'none';
            msg.style.color = '#2ECC71';
            msg.textContent = '✅ Connected!\nReal-time prices active.';
            setTimeout(function(){ window.location.href='/app.html'; }, 2000);
        }

    } catch(e) {
        showError('Connection error.', e.message);
    }
})();
</script>
</body>
</html>
