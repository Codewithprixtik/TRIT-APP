<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRIT Admin — Daily Token Setup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#fff;font-family:'Inter',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.box{background:#111;border:2px solid #FFD700;border-radius:16px;
  padding:2rem;width:100%;max-width:400px;text-align:center}
.logo{font-family:'Bangers',cursive;font-size:2rem;letter-spacing:4px;color:#FFD700;margin-bottom:0.3rem}
.sub{font-size:0.8rem;color:rgba(255,255,255,0.4);margin-bottom:2rem}
.status{padding:1rem;border-radius:10px;margin-bottom:1.5rem;font-size:0.85rem}
.status.ok{background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.3);color:#2ECC71}
.status.warn{background:rgba(255,107,0,0.1);border:1px solid rgba(255,107,0,0.3);color:#FF6B00}
.status.err{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);color:#E74C3C}
.btn{width:100%;padding:0.9rem;border-radius:10px;font-size:1rem;font-weight:700;
  cursor:pointer;border:none;margin-bottom:0.8rem;font-family:'Inter',sans-serif}
.btn-y{background:#FFD700;color:#000}
.btn-g{background:#2ECC71;color:#000}
.btn-o{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);border:1px solid #222}
input{width:100%;padding:0.7rem 1rem;background:#0a0a0a;border:1.5px solid #222;
  border-radius:8px;color:#fff;font-size:1rem;margin-bottom:1rem;outline:none;font-family:'Inter',sans-serif}
input:focus{border-color:#FFD700}
.info{font-size:0.75rem;color:rgba(255,255,255,0.3);line-height:1.6;margin-top:1rem}
</style>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="box">
  <div class="logo">TRIT.</div>
  <div class="sub">Admin Panel — Daily Token Setup</div>

  <!-- Step 1: Admin Password -->
  <div id="step1">
    <div class="status warn">🔐 Admin Login Required</div>
    <input type="password" id="adminPass" placeholder="Admin password" autocomplete="off">
    <button class="btn btn-y" onclick="checkPass()">LOGIN →</button>
  </div>

  <!-- Step 2: Token Status + Connect -->
  <div id="step2" style="display:none">
    <div class="status" id="tokenStatus">Checking token...</div>
    <button class="btn btn-y" id="connectBtn" onclick="connectUpstox()">
      📱 LOGIN WITH UPSTOX
    </button>
    <button class="btn btn-o" onclick="checkTokenStatus()">🔄 Check Status</button>
    <div class="info">
      ⏰ Token valid till midnight IST<br>
      👆 Login once daily to activate real-time prices<br>
      👥 All users get real prices automatically!
    </div>
  </div>

  <!-- Step 3: Success -->
  <div id="step3" style="display:none">
    <div class="status ok" id="successMsg">✅ Token saved! All users have real-time prices.</div>
    <button class="btn btn-g" onclick="window.location.href='/app.html'">
      📈 OPEN TRIT APP
    </button>
    <button class="btn btn-o" onclick="connectUpstox()">🔄 Reconnect Upstox</button>
    <div class="info" id="savedInfo"></div>
  </div>
</div>

<script>
var ADMIN_PASS = '';

function checkPass() {
    var p = document.getElementById('adminPass').value;
    if (!p) { alert('Enter password!'); return; }
    ADMIN_PASS = p;
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
    checkTokenStatus();
}

async function checkTokenStatus() {
    var el = document.getElementById('tokenStatus');
    el.className = 'status warn';
    el.textContent = 'Checking token status...';
    try {
        var r = await fetch('/.netlify/functions/market?action=get_token');
        var d = await r.json();
        if (d.token) {
            el.className = 'status ok';
            var saved = new Date(d.savedAt).toLocaleTimeString('en-IN');
            el.textContent = '✅ Token active! Saved at ' + saved;
            document.getElementById('connectBtn').textContent = '🔄 Reconnect Upstox (refresh token)';
        } else {
            el.className = 'status err';
            el.textContent = '❌ No token — Login with Upstox to activate!';
        }
    } catch(e) {
        el.className = 'status err';
        el.textContent = '❌ Error checking token: ' + e.message;
    }
}

async function connectUpstox() {
    try {
        var r = await fetch('/.netlify/functions/market?action=authurl');
        var d = await r.json();
        if (d.url) {
            // Save pass to sessionStorage so callback can use it
            sessionStorage.setItem('trit_admin_pass', ADMIN_PASS);
            sessionStorage.setItem('trit_admin_mode', '1');
            window.location.href = d.url;
        }
    } catch(e) {
        alert('Error: ' + e.message);
    }
}

// Check if we just came back from Upstox callback with a token
(function() {
    var params = new URLSearchParams(window.location.search);
    var token  = params.get('token');
    var saved  = params.get('saved');
    if (token || saved === '1') {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
        document.getElementById('savedInfo').textContent = 
            '🕒 Valid till midnight IST\n👥 All users have real-time prices now!';
    }
})();
</script>
</body>
</html>
